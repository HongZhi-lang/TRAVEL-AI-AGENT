services:
  postgres:
    image: postgres:15-alpine
    container_name: travelai-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: travelai
    ports:
      - "5433:5432"
    volumes:
      - ./docker/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d travelai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: travelai-redis
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: travelai-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@travelai.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - ./docker/pgadmin_data:/var/lib/pgadmin
